name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      # Linux system libs the wheels can't provide:
      #  - libegl1: PySide6's offscreen platform still dlopen's the GL stack, so the Qt
      #    smoke tests error on import without it.
      #  - libasound2-dev: python-rtmidi has no cp313 wheel and builds from source on 3.13,
      #    which needs the ALSA development headers.
      - name: Install system libraries (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libasound2-dev

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (ty)
        # ty is pre-1.0 and still flags false positives on dynamic libs (e.g. mido message
        # attributes). Kept advisory for now so it doesn't block CI; tighten to blocking once
        # the diagnostics are triaged/baselined.
        continue-on-error: true
        run: uv run ty check src/

      - name: Tests (pytest)
        run: uv run pytest --cov --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}
        # Authenticated upload via CODECOV_TOKEN: tokenless is rejected on the default
        # branch ("Token required because branch is protected"). Don't fail CI on upload
        # hiccups, and skip when the secret is absent (e.g. fork PRs).
        if: ${{ env.CODECOV_TOKEN != '' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true
