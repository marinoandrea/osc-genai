name: Release

on:
  push:
    tags:
      - "v*"

# Needs write access to create the GitHub Release and upload assets.
permissions:
  contents: write

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Verify tag matches project version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          proj="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          echo "tag=$tag project=$proj"
          if [ "$tag" != "$proj" ]; then
            echo "::error::Tag v$tag does not match pyproject version $proj. Bump 'version' in pyproject.toml to match the tag." >&2
            exit 1
          fi

      - name: Build wheel and sdist
        run: uv build

      - name: Write release notes
        run: |
          ver="${GITHUB_REF_NAME#v}"
          wheel="osc_genai-${ver}-py3-none-any.whl"
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${wheel}"
          cat > release-notes.md <<EOF
          ## Install

          First install \`uv\` (https://docs.astral.sh/uv/getting-started/installation/), then run:

          \`\`\`
          uv tool install "osc-genai[link] @ ${url}"
          \`\`\`

          This pulls all dependencies (\`torch\`, \`aalink\`, …) automatically and installs the
          console commands (\`duet\`, \`generate\`, \`train\`, …). Drop \`[link]\` to skip Ableton
          Link support.

          ---
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --generate-notes
